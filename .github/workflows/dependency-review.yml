# Flags vulnerable dependency changes on pull requests (requires dependency graph; public repos OK).
name: Dependency review

on:
  pull_request:
    paths:
      - package.json
      - package-lock.json

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: always
